<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Portfolio | My Work</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-void: #0a0a0f;
            --color-shadow: #1a1a24;
            --color-bone: #e8e4dc;
            --color-blood: #8b1538;
            --color-mist: #4a4a5a;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--color-void);
            color: var(--color-bone);
            margin: 0;
            overflow-x: hidden;
        }

        .font-display { font-family: 'Cinzel', serif; }

        /* Eerie fog effect */
        .fog-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(74, 74, 90, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(74, 74, 90, 0.1) 0%, transparent 40%);
            animation: fogDrift 20s ease-in-out infinite;
        }

        @keyframes fogDrift {
            0%, 100% { opacity: 0.7; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(-20px); }
        }

        /* Flickering effect */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; } 93% { opacity: 0.8; } 94% { opacity: 1; }
        }
        .flicker { animation: flicker 8s infinite; }

        /* Project Card Hover */
        .project-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--color-shadow);
            border: 1px solid rgba(74, 74, 90, 0.3);
        }
        .project-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(139, 21, 56, 0.2);
        }

        /* Reveal on Scroll */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Glitch effect */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        .glitch:hover { animation: glitch 0.3s infinite; }
    </style>
</head>
<body class="h-full">
    <div class="fog-layer"></div>

    <div class="relative z-10 w-full h-full overflow-auto">
        <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 backdrop-blur-md bg-[#0a0a0f]/80">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="font-display text-lg tracking-widest glitch text-[#8b1538]">⛧ JINJARIYA SONGPRAKHON</div>
                <div class="flex gap-8">
                    <a href="#work" class="text-sm uppercase text-[#4a4a5a] hover:text-white transition-colors">Work</a>
                    <a href="#about" class="text-sm uppercase text-[#4a4a5a] hover:text-white transition-colors">About</a>
                    <a href="#contact" class="text-sm uppercase text-[#4a4a5a] hover:text-white transition-colors">Contact</a>
                </div>
            </div>
        </nav>

        <section class="min-h-screen flex items-center justify-center px-6 text-center">
            <div>
                <div class="mb-4 text-sm tracking-[0.3em] uppercase text-[#4a4a5a]">Welcome to the void</div>
                <h1 class="font-display text-5xl md:text-8xl tracking-wider mb-6 flicker text-[#e8e4dc]">PORTFOLIO</h1>
                <p class="text-xl italic mb-12 text-[#4a4a5a]">Game Designer & 3D Modeler</p>
                <a href="#work" class="inline-block px-8 py-3 border border-[#8b1538] text-[#8b1538] font-display text-sm tracking-wider uppercase hover:bg-[#8b1538] hover:text-white transition-all">
                    Enter the Gallery
                </a>
            </div>
        </section>

        <section id="work" class="py-32 px-6 max-w-6xl mx-auto">
            <h2 class="text-center font-display text-4xl mb-20 reveal flicker tracking-[0.2em]">GAME DESIGN</h2>
            
            <div class="grid md:grid-cols-2 gap-12">
                
                <div class="project-card reveal p-8 border" style="background: #16161f; border-color: rgba(74, 74, 90, 0.2);">
                    <div class="aspect-video mb-8 flex items-center justify-center relative overflow-hidden" style="background: #0d0d12;">
                        <div class="w-6 h-6 border-2 border-[#8b1538] rotate-45"></div>
                    </div>
                    <h3 class="font-display text-2xl tracking-wider mb-2" style="color: var(--color-bone);">
                        ONE CANDLE AWAY
                    </h3>
                    <p class="text-xs tracking-[0.15em] uppercase" style="color: var(--color-mist);">
                        PERSONAL PROJECT FROM UNITY
                    </p>
                </div>

                </div>

                <div class="grid md:grid-cols-2 gap-12">
                
                <div class="project-card reveal p-8 border" style="background: #16161f; border-color: rgba(74, 74, 90, 0.2);">
                    <div class="aspect-video mb-8 flex items-center justify-center relative overflow-hidden" style="background: #0d0d12;">
                        <div class="w-6 h-6 border-2 border-[#8b1538] rotate-45"></div>
                    </div>
                    <h3 class="font-display text-2xl tracking-wider mb-2" style="color: var(--color-bone);">
                        ONVE UPON THE TIME
                    </h3>
                    <p class="text-xs tracking-[0.15em] uppercase" style="color: var(--color-mist);">
                        2.5D HORROR GAME
                    </p>
                </div>

                </div>

        </section>

        <section id="contact" class="py-32 px-6 text-center reveal">
            <h2 class="font-display text-4xl mb-6">CONTACT</h2>
            <div class="flex flex-col items-center space-y-4">
                <a href="mailto:emilio25qx@gmail.com" class="text-xl font-display text-[#e8e4dc] border-b border-[#8b1538] hover:text-[#8b1538] transition-colors">
                    emilio25qx@gmail.com
                </a>
                <a href="tel:+66616624252" class="text-xl font-display text-[#e8e4dc] border-b border-[#8b1538] hover:text-[#8b1538] transition-colors">
                    +66 616624252
                </a>
            </div>
        </section>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
